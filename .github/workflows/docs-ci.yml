name: Docs CI/CD

on:
  push:
    branches: [main]
    paths:
      - "packages/docs/**"
      - "packages/design-system/**"
      - "tsconfig.base.json"
      - ".github/workflows/docs-ci.yml"
  pull_request:
    paths:
      - "packages/docs/**"
      - "packages/design-system/**"
      - "tsconfig.base.json"
      - ".github/workflows/docs-ci.yml"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/docs

jobs:
  build:
    name: Build docs
    runs-on: depot-ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/docs/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,scope=docs,mode=max,ignore-error=true

  deploy:
    name: Deploy docs
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cartridge-infra deploy
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DISPATCH_GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/gamesgamesgamesgamesgames/cartridge-infra/dispatches \
            -d '{"event_type":"deploy-docs","client_payload":{"image_tag":"latest"}}'
